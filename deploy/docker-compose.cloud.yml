name: city-flash

services:
  api:
    image: ${API_IMAGE}
    env_file:
      - ${API_ENV_FILE:-env.production}
    restart: unless-stopped
    expose:
      - "3000"
    volumes:
      - ./secrets/apiclient_key.pem:/run/secrets/apiclient_key.pem:ro
      - ./secrets/wechatpay_platform.pem:/run/secrets/wechatpay_platform.pem:ro
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/health/ready').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    networks:
      - app

  merchant:
    image: ${MERCHANT_IMAGE}
    restart: unless-stopped
    expose:
      - "80"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1/healthz"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    networks:
      - app

  gateway:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
      merchant:
        condition: service_healthy
    environment:
      API_DOMAIN: ${API_DOMAIN}
      OPS_DOMAIN: ${OPS_DOMAIN}
      NGINX_ENVSUBST_FILTER: ^(API_DOMAIN|OPS_DOMAIN)$
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf.template:/etc/nginx/templates/default.conf.template:ro
      - ./certs/fullchain.pem:/etc/nginx/certs/fullchain.pem:ro
      - ./certs/privkey.pem:/etc/nginx/certs/privkey.pem:ro
    networks:
      - app

  migrate:
    image: ${API_MIGRATION_IMAGE}
    env_file:
      - ${API_ENV_FILE:-env.production}
    command: ["npm", "run", "prisma:deploy"]
    profiles: ["tools"]
    networks:
      - app

  operator-init:
    image: ${API_MIGRATION_IMAGE}
    env_file:
      - ${API_ENV_FILE:-env.production}
    command: ["npm", "run", "operator:create"]
    profiles: ["tools"]
    networks:
      - app

networks:
  app:
    driver: bridge
