name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: server/api/package-lock.json
      - run: npm ci
      - run: npm run prisma:generate
      - run: npm test -- --runInBand
      - run: npm run build
      - run: npm run lint
      - run: npx prisma validate

  customer-mini-program:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: >-
          node --test
          apps/customer-mp/tests/service-flow.test.js
          apps/customer-mp/tests/map-backend.test.js
          apps/customer-mp/tests/auth-payment.test.js

  rider-mini-program:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: find apps/rider-mp -name '*.js' -print0 | xargs -0 -n1 node --check

  merchant-web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/merchant-web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/merchant-web/package-lock.json
      - run: npm ci
      - run: npm run build
        env:
          VITE_API_BASE_URL: https://api.example.com/api

  container-images:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build --target runtime -t city-flash-api:ci server/api
      - run: docker build --target migration -t city-flash-api-migration:ci server/api
      - run: >-
          docker build
          --build-arg VITE_API_BASE_URL=https://api.example.com/api
          -t city-flash-merchant:ci
          apps/merchant-web
