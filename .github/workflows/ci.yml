name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  api:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: city_flash_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U ci -d city_flash_ci"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=12
    env:
      DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/city_flash_ci?schema=public
    defaults:
      run:
        working-directory: server/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: server/api/package-lock.json
      - run: npm ci
      - run: npm run prisma:generate
      - run: npm run prisma:deploy
      - run: npm test -- --runInBand
      - run: npm run build
      - run: npm run lint
      - run: npx prisma validate

  customer-mini-program:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node --test apps/customer-mp/tests/*.test.js

  rider-mini-program:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: >-
          find apps/customer-mp -name '*.js' -print0 |
          xargs -0 -n1 node --check

  merchant-web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/merchant-web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/merchant-web/package-lock.json
      - run: npm ci
      - run: npm run build
        env:
          VITE_API_BASE_URL: https://api.example.com/api

  container-images:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build --target runtime -t city-flash-api:ci server/api
      - run: docker build --target migration -t city-flash-api-migration:ci server/api
      - run: >-
          docker build
          --build-arg VITE_API_BASE_URL=https://api.example.com/api
          -t city-flash-merchant:ci
          apps/merchant-web
