name: Publish container images

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      IMAGE_ROOT: ghcr.io/${{ github.repository_owner }}
      VERSION: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: ./server/api
          target: runtime
          push: true
          tags: |
            ${{ env.IMAGE_ROOT }}/city-flash-api:${{ env.VERSION }}
            ${{ env.IMAGE_ROOT }}/city-flash-api:latest

      - uses: docker/build-push-action@v6
        with:
          context: ./server/api
          target: migration
          push: true
          tags: |
            ${{ env.IMAGE_ROOT }}/city-flash-api-migration:${{ env.VERSION }}
            ${{ env.IMAGE_ROOT }}/city-flash-api-migration:latest

      - uses: docker/build-push-action@v6
        with:
          context: ./apps/merchant-web
          push: true
          build-args: |
            VITE_API_BASE_URL=https://api.example.com/api
          tags: |
            ${{ env.IMAGE_ROOT }}/city-flash-merchant:${{ env.VERSION }}
            ${{ env.IMAGE_ROOT }}/city-flash-merchant:latest
