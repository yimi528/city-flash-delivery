name: Publish container images

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      merchant_api_base_url:
        description: '运营后台使用的 API 地址，例如 https://api.example.cn/api'
        required: true
        default: 'https://xian-api-img6c740.sealosbja.site/api'

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      IMAGE_ROOT: ghcr.io/${{ github.repository_owner }}
      VERSION: ${{ github.sha }}
      MERCHANT_API_BASE_URL: ${{ github.event.inputs.merchant_api_base_url || 'https://xian-api-img6c740.sealosbja.site/api' }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: ./server/api
          target: runtime
          push: true
          tags: |
            ${{ env.IMAGE_ROOT }}/city-flash-api:${{ env.VERSION }}
            ${{ env.IMAGE_ROOT }}/city-flash-api:latest

      - uses: docker/build-push-action@v6
        with:
          context: ./server/api
          target: migration
          push: true
          tags: |
            ${{ env.IMAGE_ROOT }}/city-flash-api-migration:${{ env.VERSION }}
            ${{ env.IMAGE_ROOT }}/city-flash-api-migration:latest

      - uses: docker/build-push-action@v6
        with:
          context: ./apps/merchant-web
          push: true
          build-args: |
            VITE_API_BASE_URL=${{ env.MERCHANT_API_BASE_URL }}
          tags: |
            ${{ env.IMAGE_ROOT }}/city-flash-merchant:${{ env.VERSION }}
            ${{ env.IMAGE_ROOT }}/city-flash-merchant:latest
